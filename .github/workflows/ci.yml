name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint (flake8)
        run: flake8 etl models dashboard tests --max-line-length=120 --ignore=E203,W503

      - name: Ejecutar pipeline ETL
        run: python -m etl.run_pipeline

      - name: Entrenar modelos
        run: python -m models.train_model

      - name: Ejecutar tests unitarios
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Build imagen Docker
        run: docker build -t fifa2026-dashboard:ci .
